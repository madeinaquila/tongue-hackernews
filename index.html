<!DOCTYPE html>
<html lang="it" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tongue | Tech News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body>

    <header class="header">
      <div class="header__top">
        <div class="header__date" id="header-date"></div>
        <div class="header__brand">
          <span class="header__logo">👅</span>
          <span class="header__name">Tongue</span>
        </div>
        <div class="header__actions">
          <button class="theme-toggle" id="theme-toggle" title="Cambia tema">
            <span class="theme-toggle__icon">🌙</span>
          </button>
          <button class="fav-btn-header" id="fav-toggle-btn">
            ⭐ Preferiti <span id="fav-count" class="hidden">0</span>
          </button>
        </div>
      </div>
      <div class="header__bottom">
        <div class="header__bottom-inner">
          <span class="header__tagline">Tech Feed · Hacker News</span>
          <div class="header__stats">
            <span class="stat">📰 <strong id="stat-loaded">0</strong> news</span>
            <span class="stat">🔥 <strong id="stat-top-source">—</strong></span>
            <span class="stat">⏱ <strong id="stat-time">—</strong></span>
          </div>
        </div>
      </div>
    </header>

    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="Cerca nelle news caricate…" autocomplete="off" />
      <span class="search-count hidden" id="search-count"></span>
    </div>

    <main class="main">
      <div id="news-container" class="news-grid"></div>

      <div id="no-results" class="no-results hidden">
        <div class="no-results__icon">🔍</div>
        <p>Nessuna news trovata per "<span id="no-results-term"></span>"</p>
      </div>

      <div id="loading-state" class="loading-state">
        <div class="loading-state__dots"><span></span><span></span><span></span></div>
        <p>Caricamento news in corso…</p>
      </div>

      <div id="error-state" class="error-state hidden">
        <p>⚠️ Impossibile caricare le notizie. Riprova.</p>
        <button id="retry-btn" class="btn btn--outline">Riprova</button>
      </div>

      <div class="load-more-wrapper">
        <button id="load-more-btn" class="btn btn--primary hidden">
          <span class="btn__text">Carica altre 10 news</span>
          <span class="btn__loader hidden"></span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>Dati da <a href="https://news.ycombinator.com" target="_blank" rel="noopener">Hacker News</a> · <strong>Tongue Tech Feed</strong></p>
    </footer>

    <button class="scroll-top" id="scroll-top">↑</button>

    <div class="fav-overlay" id="fav-overlay"></div>
    <aside class="fav-panel" id="fav-panel">
      <div class="fav-panel__header">
        <h2 class="fav-panel__title">⭐ Preferiti</h2>
        <button class="fav-panel__close" id="fav-close">✕</button>
      </div>
      <div class="fav-panel__list" id="fav-list">
        <div class="fav-panel__empty">Nessun preferito ancora.<br>Clicca ⭐ su una news!</div>
      </div>
    </aside>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
